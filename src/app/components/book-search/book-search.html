<div class="flex flex-col gap-3">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Cercar per títol o autor..."
    class="border border-amber-300 rounded-lg px-4 py-2 w-full focus:outline-none focus:ring-2 focus:ring-amber-400"
  />

  @if (loading()) {
    <p class="text-sm text-gray-400 text-center">Cercant...</p>
  }

  @if ((books$ | async); as books) {
    <ul class="flex flex-col gap-2 text-lg font-light">
      @for (book of books; track book.id) {
        <li class="flex justify-between items-center border-b border-amber-100 py-1">
          <span>{{ book.title }}</span>
          <span class="text-sm text-gray-500">{{ book.author }}</span>
        </li>
      } @empty {
        @if (!loading()) {
          <p class="text-center text-gray-400 text-sm">No s'han trobat llibres.</p>
        }
      }
    </ul>
  }
</div>
