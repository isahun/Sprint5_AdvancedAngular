<section class="list-container m-auto flex flex-col gap-4 p-10 text-center bg-amber-50">
  <h1 class="text-3xl font-semibold mb-5">Llista de llibres</h1>

  @if (selectedBookId()) {
  <app-book-details [bookId]="selectedBookId()!" (bookUpdated)="updateBook($event)" (bookDeleted)="deleteBook($event)"
    (goBack)="selectedBookId.set(null)"></app-book-details>

  } @else {

  <ul class="flex flex-col gap-4 text-2xl font-light">
    @for (book of bookState.books(); track book.id) {
    <li class="flex flex-row items-center justify-center gap-3">
      <input type="checkbox" [checked]="bookState.selectedBookIds().has(book.id)"
      (change)="bookState.toggleBookSelection(book.id)" class="w-5 h-5 m-5 cursor-pointer">
      <span (click)="selectBook(book.id)" style="cursor: pointer">{{ book.title }}</span>
    </li>
    }
  </ul>
  @if (bookState.selectedCount() > 0) {
  <button type="button" (click)="removeSelected()" class="back-btn">Eliminar seleccionats ({{ bookState.selectedCount()
    }})</button>
  }
  <button type="button" (click)="addBook()" class="back-btn">
    Afegeix un llibre
  </button>
  }
</section>
